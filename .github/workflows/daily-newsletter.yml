name: Daily Family Newsletter

on:
  workflow_dispatch: {}
  schedule:
    # GitHub cron is UTC, has no DST awareness, AND frequently fires 1-2 h late
    # under load. 8:00 AM America/Los_Angeles is 15:00 UTC in PDT (summer) and
    # 16:00 UTC in PST (winter). We fire hourly across 15:00-19:00 UTC so at
    # least one run lands in the morning Pacific window even when GitHub is late.
    # The per-day cache marker below guarantees exactly ONE edition per Pacific
    # date no matter how many of these fire. Manual runs always send.
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
    - cron: "0 17 * * *"
    - cron: "0 18 * * *"
    - cron: "0 19 * * *"

concurrency:
  group: daily-newsletter
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Non-secret runtime config (mirrors the local .env, minus credentials).
      APP_ENV: production
      SAMPLE_MODE: "true"
      CONFIG_FILE: config.example.yaml
      NEWSLETTER_TIMEZONE: America/Los_Angeles
      NEWSLETTER_SEND_TIME: "08:00"
      NEWSLETTER_ENABLED: "true"
      EMAIL_PROVIDER: smtp
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      WEATHER_PROVIDER: sample
      # Secrets (set these in GitHub → Settings → Secrets and variables → Actions).
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Determine send window
        id: window
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("America/Los_Angeles"))
          event = os.environ.get("GITHUB_EVENT_NAME", "")
          # Accept a morning window (8-11 AM Pacific) rather than an exact hour so
          # a late-firing cron still sends. The cache marker prevents duplicates.
          in_window = 8 <= now.hour <= 11
          should = event == "workflow_dispatch" or in_window
          print(f"should_send={'true' if should else 'false'}")
          print(f"pacific_hour={now.hour}")
          print(f"pacific_date={now.strftime('%Y-%m-%d')}")
          PY

      - name: Restore daily send marker
        id: marker
        if: github.event_name != 'workflow_dispatch' && steps.window.outputs.should_send == 'true'
        uses: actions/cache/restore@v4
        with:
          path: .sent-marker
          key: newsletter-sent-${{ steps.window.outputs.pacific_date }}

      - name: Decide whether to send
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — sending."
            echo "send=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.window.outputs.should_send }}" != "true" ]; then
            echo "Outside morning send window (Pacific hour ${{ steps.window.outputs.pacific_hour }}); skipping."
            echo "send=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.marker.outputs.cache-hit }}" = "true" ]; then
            echo "Already sent today (${{ steps.window.outputs.pacific_date }}); skipping duplicate."
            echo "send=false" >> "$GITHUB_OUTPUT"
          else
            echo "In window and not yet sent today — sending."
            echo "send=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Send newsletter
        if: steps.decide.outputs.send == 'true'
        run: python -m family_newsletter.app.run_daily --now

      - name: Record daily send marker
        if: steps.decide.outputs.send == 'true' && github.event_name != 'workflow_dispatch'
        run: date -u +%FT%TZ > .sent-marker

      - name: Save daily send marker
        if: steps.decide.outputs.send == 'true' && github.event_name != 'workflow_dispatch'
        uses: actions/cache/save@v4
        with:
          path: .sent-marker
          key: newsletter-sent-${{ steps.window.outputs.pacific_date }}
